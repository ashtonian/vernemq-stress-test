# balanced_cluster.yaml — Balance and rebalance overlay
# Overrides default.yaml values; see default.yaml for version-gating docs.
# All settings below are integration-only — silently skipped on v2.1.x/v1.x.

metadata:
  name: balanced_cluster
  description: "Balance and rebalance enabled with auto-interval"

tunables:
  balance_enabled: "on"
  balance_reject_enabled: "on"
  balance_threshold: "1.2"
  balance_hysteresis: "0.1"
  balance_min_connections: 100
  balance_check_interval: 5000
  rebalance_enabled: "on"
  rebalance_threshold: "1.3"
  rebalance_batch_size: 50
  rebalance_cooldown: 30
  rebalance_on_node_join: "on"
  rebalance_stable_interval: 60
  rebalance_auto_interval: 120
