# netsplit_tolerant.yaml — Quorum-based health overlay
# Overrides default.yaml values; see default.yaml for version-gating docs.
# All settings below are integration-only — silently skipped on v2.1.x/v1.x.

metadata:
  name: netsplit_tolerant
  description: "Quorum-based health with dead node cleanup"

tunables:
  cluster_ready_quorum: "0.6"
  dead_node_cleanup_timeout: 120
  allow_register_during_netsplit: "on"
  allow_publish_during_netsplit: "on"
  allow_subscribe_during_netsplit: "on"
