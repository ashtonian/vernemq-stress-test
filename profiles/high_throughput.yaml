# high_throughput.yaml — Maximum throughput overlay
# Overrides default.yaml values; see default.yaml for version-gating docs.
# Note: reg_trie_workers and outgoing_clustering_connection_count are
# integration-only — they will be silently skipped on v2.1.x/v1.x.

metadata:
  name: high_throughput
  description: "Maximum throughput configuration"

tunables:
  reg_trie_workers: 16
  outgoing_clustering_connection_count: 8
  max_inflight_messages: 500
  coordinate_registrations: "off"
  mqtt_listener_nr_of_acceptors: 200
  mqtt_listener_max_connections: 1000000
  erlang_async_threads: 128
  erlang_max_ports: 2097152
