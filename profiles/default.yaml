# default.yaml — Stock VerneMQ configuration (base for all overlay profiles)
#
# HOW VERSION GATING WORKS:
#   This file defines ALL tunables as a flat key-value store. Not every setting
#   exists in every VerneMQ version. The Ansible template (vernemq.conf.j2) uses
#   `vernemq_version_family` conditionals to control which settings actually
#   appear in the generated vernemq.conf:
#
#     - "all versions"   — always rendered (queue, listener, erlang, auth, netsplit, etc.)
#     - "2.x+"           — outgoing_clustering_buffer_size (skipped for 1.x)
#     - "integration"    — balance, rebalance, reg_trie_workers, connection pool,
#                          cluster health, gossip tuning, reconnect tuning
#
#   Settings gated behind {% if vernemq_version_family == 'integration' %} will
#   be SILENTLY IGNORED when deploying to v2.1.x or v1.x — they won't reach
#   Cuttlefish and won't cause errors.
#
# OVERLAY PROFILES:
#   Other profiles (high_throughput.yaml, balanced_cluster.yaml, etc.) only need
#   to specify the tunables they want to override. apply_profile.sh merges them
#   on top of this file before passing to Ansible.

metadata:
  name: default
  description: "Stock VerneMQ configuration"

tunables:
  # --- All versions (valid in v1.x, v2.x, and integration) -----------------

  # Listener defaults
  mqtt_listener_nr_of_acceptors: 200
  mqtt_listener_max_connections: 500000
  listener_max_connections: 50000
  listener_nr_of_acceptors: 200
  tcp_listen_options: "[{nodelay, true}, {linger, {true, 8}}, {send_timeout, 5000}, {send_timeout_close, true}, {backlog, 3072}, {exit_on_close, true}, {keepalive, true}]"
  listener_tcp_allowed_protocol_versions: "3,4,5"
  listener_tcp_proxy_protocol: "off"
  listener_ws_allowed_protocol_versions: "3,4,5"
  listener_ws_proxy_protocol: "off"

  # Queue / message settings
  max_inflight_messages: 50
  max_online_messages: 10000
  max_offline_messages: 10000
  queue_deliver_mode: fanout
  queue_type: fifo
  max_message_rate: 0
  max_message_size: 0
  upgrade_outgoing_qos: "on"

  # MQTT protocol
  mqtt_connect_timeout: 30000
  disconnect_on_unauthorized_publish_v3: "on"
  persistent_client_expiration: "72h"

  # Session / registration
  coordinate_registrations: "on"
  shared_subscription_policy: prefer_local

  # Netsplit behavior (valid in all versions)
  allow_register_during_netsplit: "on"
  allow_publish_during_netsplit: "on"
  allow_subscribe_during_netsplit: "on"
  allow_unsubscribe_during_netsplit: "on"

  # Storage
  leveldb_maximum_memory_percent: 20

  # Erlang VM
  erlang_async_threads: 64
  erlang_max_ports: 1048576
  erlang_max_processes: 1048576
  erlang_distribution_buffer_size: 32768

  # --- 2.x+ only (skipped for 1.x) ----------------------------------------

  outgoing_clustering_buffer_size: 10000

  # --- Integration branch only (skipped for v2.1.x, v2.0.x, v1.x) ---------

  # Clustering reconnect tuning
  outgoing_clustering_reconnect_base_delay: 1000
  outgoing_clustering_reconnect_max_delay: 5000
  outgoing_clustering_connection_count: 4
  outgoing_clustering_buffer_drop_policy: "lifo"

  # Registry
  reg_trie_workers: 8
  reg_sync_shards: 8

  # Balance
  balance_enabled: "off"
  balance_reject_enabled: "off"
  balance_threshold: "1.2"
  balance_hysteresis: "0.1"
  balance_min_connections: 100
  balance_check_interval: 5000

  # Rebalance
  rebalance_enabled: "off"
  rebalance_threshold: "1.3"
  rebalance_batch_size: 50
  rebalance_cooldown: 30
  rebalance_on_node_join: "off"
  rebalance_stable_interval: 60
  rebalance_auto_interval: 0

  # Cluster health
  cluster_ready_quorum: "1.0"
  cluster_ready_rpc_timeout: 5000
  dead_node_cleanup_timeout: 0

  # Gossip (vmq_swc)
  gossip_interval: 15000
  fast_gossip_interval: 2000
  fast_gossip_duration: 30000
