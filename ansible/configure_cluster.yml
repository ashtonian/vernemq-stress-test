---
# Start VerneMQ on all nodes and form a cluster by joining nodes 2..N to node 1.
#
# Usage:
#   ansible-playbook -i inventory/hosts configure_cluster.yml
#
- name: Start VerneMQ on all nodes
  hosts: vmq_nodes
  become: true
  vars_files:
    - roles/vernemq/defaults/main.yml
  pre_tasks:
    - name: Set vmq-admin command for source builds
      ansible.builtin.set_fact:
        vmq_admin_cmd: "{{ vernemq_install_dir }}/bin/vmq-admin"
      when: build_mode in ['source', 'git_clone']
  tasks:
    - name: Start VerneMQ service
      ansible.builtin.service:
        name: vernemq
        state: started
        enabled: true

    - name: Wait for VerneMQ to be ready
      ansible.builtin.command:
        cmd: "{{ vmq_admin_cmd | default('/usr/sbin/vmq-admin') }} cluster show"
      register: vmq_ready
      until: vmq_ready.rc == 0
      retries: 30
      delay: 5
      changed_when: false

- name: Join nodes to cluster
  hosts: vmq_nodes[1:]
  become: true
  serial: 1
  vars:
    first_node_ip: "{{ hostvars[groups['vmq_nodes'][0]].ansible_host }}"
  tasks:
    - name: Check if already in cluster
      ansible.builtin.command:
        cmd: "{{ vmq_admin_cmd | default('/usr/sbin/vmq-admin') }} cluster show"
      register: cluster_status
      changed_when: false

    - name: Join to first node
      ansible.builtin.command:
        cmd: "{{ vmq_admin_cmd | default('/usr/sbin/vmq-admin') }} cluster join discovery-node=VerneMQ@{{ first_node_ip }}"
      when: first_node_ip not in cluster_status.stdout
      changed_when: true

- name: Verify cluster convergence
  hosts: vmq_nodes[0]
  become: true
  tasks:
    - name: Wait for all nodes to appear in cluster
      ansible.builtin.command:
        cmd: "{{ vmq_admin_cmd | default('/usr/sbin/vmq-admin') }} cluster show"
      register: cluster_final
      until: cluster_final.stdout_lines | select('search', 'true') | list | length == (groups['vmq_nodes'] | length)
      retries: 60
      delay: 5
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: "{{ cluster_final.stdout_lines }}"
