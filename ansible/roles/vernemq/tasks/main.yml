---
- name: Auto-detect version family
  ansible.builtin.set_fact:
    vernemq_version_family: >-
      {% if build_mode == 'source' %}integration{% elif build_mode == 'git_clone' %}{% if vernemq_git_ref is defined and vernemq_git_ref is match('^v?[0-9]+\.') %}{% if vernemq_git_ref is match('^v?1\.') %}1.x{% else %}2.x{% endif %}{% else %}integration{% endif %}{% elif vernemq_version is match('^1\.') %}1.x{% else %}2.x{% endif %}
  when: vernemq_version_family == 'auto'

- name: Display detected version family
  ansible.builtin.debug:
    msg: "VerneMQ version family: {{ vernemq_version_family }} (build_mode={{ build_mode }}, ref={{ vernemq_git_ref | default('N/A') }})"

- name: Set vmq-admin command for source builds
  ansible.builtin.set_fact:
    vmq_admin_cmd: "{{ vernemq_install_dir }}/bin/vmq-admin"
  when: build_mode in ['source', 'git_clone']

- name: Install required packages
  ansible.builtin.dnf:
    name:
      - openssl
      - openssl-devel
      - ncurses-devel
      - gcc
      - gcc-c++
      - make
      - git
      - tar
      - cmake
      - snappy-devel
    state: present
  become: true

# --------------------------------------------------------------------------
# Create vernemq user/group (needed for source builds; RPM creates it)
# --------------------------------------------------------------------------

- name: Create vernemq group
  ansible.builtin.group:
    name: vernemq
    state: present
  become: true

- name: Create vernemq user
  ansible.builtin.user:
    name: vernemq
    group: vernemq
    system: true
    shell: /sbin/nologin
    create_home: false
  become: true

# --------------------------------------------------------------------------
# Release mode: download prebuilt package from GitHub
# --------------------------------------------------------------------------

- name: Download VerneMQ release RPM
  ansible.builtin.get_url:
    url: "{{ vernemq_release_url }}"
    dest: "/tmp/vernemq-{{ vernemq_version }}.rpm"
    mode: "0644"
  when: build_mode == "release"

- name: Install VerneMQ RPM
  ansible.builtin.dnf:
    name: "/tmp/vernemq-{{ vernemq_version }}.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when: build_mode == "release"

# --------------------------------------------------------------------------
# Source mode: upload local repo, build on node 1, distribute tarball
# --------------------------------------------------------------------------

- name: Install Erlang/OTP 27.2 from source (build node only)
  when: build_mode in ["source", "git_clone"]
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  block:
    - name: Install Erlang build dependencies
      ansible.builtin.dnf:
        name:
          - autoconf
          - openssl-devel
          - ncurses-devel
          - gcc
          - gcc-c++
          - make
          - perl
          - unixODBC-devel
          - libxslt
        state: present
      become: true

    - name: Check if Erlang 27 is already installed
      ansible.builtin.command:
        cmd: erl -eval 'erlang:display(erlang:system_info(otp_release)), halt().' -noshell
      changed_when: false
      failed_when: false
      register: existing_erlang

    - name: Download Erlang/OTP 27.2 source
      ansible.builtin.get_url:
        url: "https://github.com/erlang/otp/releases/download/OTP-27.2/otp_src_27.2.tar.gz"
        dest: /tmp/otp_src_27.2.tar.gz
        mode: "0644"
      when: existing_erlang.rc != 0 or '"27"' not in existing_erlang.stdout

    - name: Extract Erlang source
      ansible.builtin.unarchive:
        src: /tmp/otp_src_27.2.tar.gz
        dest: /tmp/
        remote_src: true
      when: existing_erlang.rc != 0 or '"27"' not in existing_erlang.stdout

    - name: Build and install Erlang/OTP 27.2
      ansible.builtin.shell:
        cmd: |
          cd /tmp/otp_src_27.2
          ./configure --without-javac --without-wx --without-debugger --without-observer --without-et --without-megaco
          make -j$(nproc)
          make install
      become: true
      changed_when: true
      when: existing_erlang.rc != 0 or '"27"' not in existing_erlang.stdout
      timeout: 1200

    - name: Verify Erlang version
      ansible.builtin.command:
        cmd: erl -eval 'erlang:display(erlang:system_info(otp_release)), halt().' -noshell
      changed_when: false
      register: erlang_version

    - name: Display Erlang version
      ansible.builtin.debug:
        msg: "Erlang OTP version: {{ erlang_version.stdout }}"

- name: Capture git version locally
  ansible.builtin.command:
    cmd: git describe --tags --always
    chdir: "{{ vernemq_local_src_dir }}"
  delegate_to: localhost
  become: false
  run_once: true
  when: build_mode == "source"
  changed_when: false
  register: local_git_version

- name: Create source archive locally (without .git to reduce size)
  ansible.builtin.shell:
    cmd: >-
      tar czf /tmp/vernemq-integration-src.tar.gz
      --exclude='{{ vernemq_local_src_dir | basename }}/_build'
      --exclude='{{ vernemq_local_src_dir | basename }}/.git'
      --exclude='{{ vernemq_local_src_dir | basename }}/.claude'
      --exclude='{{ vernemq_local_src_dir | basename }}/bench/results'
      --exclude='{{ vernemq_local_src_dir | basename }}/erl_crash.dump'
      -C "{{ vernemq_local_src_dir | dirname }}"
      "{{ vernemq_local_src_dir | basename }}"
  delegate_to: localhost
  become: false
  run_once: true
  when: build_mode == "source"
  changed_when: true

- name: Upload source archive to build node
  ansible.builtin.copy:
    src: /tmp/vernemq-integration-src.tar.gz
    dest: /tmp/vernemq-integration-src.tar.gz
    mode: "0644"
  become: true
  when: build_mode == "source"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Clean previous source directory
  ansible.builtin.file:
    path: "{{ vernemq_src_dir }}"
    state: absent
  become: true
  when: build_mode == "source"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Extract source archive
  ansible.builtin.unarchive:
    src: /tmp/vernemq-integration-src.tar.gz
    dest: /opt/
    remote_src: true
  become: true
  when: build_mode == "source"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Rename extracted directory to vernemq source dir
  ansible.builtin.command:
    cmd: mv /opt/{{ vernemq_local_src_dir | basename }} {{ vernemq_src_dir }}
    creates: "{{ vernemq_src_dir }}"
  become: true
  when: build_mode == "source"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Initialize git repo for version detection
  ansible.builtin.shell:
    cmd: |
      git config --global --add safe.directory {{ vernemq_src_dir }}
      git init
      git add -A
      git commit -m "bench build"
      git tag -a "{{ local_git_version.stdout | default('integration') }}" -m "bench"
    chdir: "{{ vernemq_src_dir }}"
  become: true
  when: build_mode == "source"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  changed_when: true
  environment:
    HOME: /root
    GIT_AUTHOR_NAME: bench
    GIT_AUTHOR_EMAIL: bench@localhost
    GIT_COMMITTER_NAME: bench
    GIT_COMMITTER_EMAIL: bench@localhost

# --------------------------------------------------------------------------
# Git clone mode: clone repo at ref on build node
# --------------------------------------------------------------------------

- name: Clone VerneMQ git repository
  ansible.builtin.git:
    repo: "{{ vernemq_git_repo }}"
    dest: "{{ vernemq_src_dir }}"
    version: "{{ vernemq_git_ref }}"
    depth: 1
    force: true
  become: true
  when: build_mode == "git_clone"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Capture git version from cloned repo
  ansible.builtin.command:
    cmd: git describe --tags --always
    chdir: "{{ vernemq_src_dir }}"
  become: true
  when: build_mode == "git_clone"
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  changed_when: false
  register: cloned_git_version

- name: Build VerneMQ from source (rebar3 as prod release)
  ansible.builtin.shell:
    cmd: make rel 2>&1
    chdir: "{{ vernemq_src_dir }}"
  become: true
  when: build_mode in ["source", "git_clone"]
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  changed_when: true
  register: build_result
  failed_when: false
  environment:
    HOME: /root
  timeout: 1800

- name: Display build result (last 20 lines)
  ansible.builtin.debug:
    msg: "{{ (build_result.stdout_lines | default([]))[-20:] }}"
  when: build_mode in ["source", "git_clone"]
  run_once: true

- name: Verify release was assembled
  ansible.builtin.stat:
    path: "{{ vernemq_src_dir }}/_build/default/rel/vernemq/bin/vernemq"
  become: true
  when: build_mode in ["source", "git_clone"]
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  register: release_check
  failed_when: not release_check.stat.exists

- name: Set tarball filename
  ansible.builtin.set_fact:
    _vmq_tarball: "vernemq-source-{{ vernemq_git_ref | default('build') | regex_replace('[^a-zA-Z0-9._-]', '_') }}.tar.gz"
  when: build_mode in ["source", "git_clone"]

- name: Create VerneMQ tarball from build
  ansible.builtin.command:
    cmd: >-
      tar czf /tmp/{{ _vmq_tarball }}
      -C {{ vernemq_src_dir }}/_build/default/rel vernemq
  become: true
  when: build_mode in ["source", "git_clone"]
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"
  changed_when: true

- name: Fetch VerneMQ tarball to controller
  ansible.builtin.fetch:
    src: /tmp/{{ _vmq_tarball }}
    dest: /tmp/{{ _vmq_tarball }}
    flat: true
  when: build_mode in ["source", "git_clone"]
  run_once: true
  delegate_to: "{{ groups['vmq_nodes'][0] }}"

- name: Distribute VerneMQ tarball to all nodes
  ansible.builtin.copy:
    src: /tmp/{{ _vmq_tarball }}
    dest: /tmp/{{ _vmq_tarball }}
    mode: "0644"
  become: true
  when: build_mode in ["source", "git_clone"]

- name: Create VerneMQ install directory
  ansible.builtin.file:
    path: "{{ vernemq_install_dir }}"
    state: directory
    mode: "0755"
    owner: vernemq
    group: vernemq
  become: true
  when: build_mode in ["source", "git_clone"]

- name: Extract VerneMQ tarball
  ansible.builtin.unarchive:
    src: /tmp/{{ _vmq_tarball }}
    dest: "{{ vernemq_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    owner: vernemq
    group: vernemq
  become: true
  when: build_mode in ["source", "git_clone"]

- name: Ensure VerneMQ data directory ownership (for cuttlefish generated configs)
  ansible.builtin.file:
    path: "{{ vernemq_install_dir }}/data"
    state: directory
    owner: vernemq
    group: vernemq
    recurse: true
  become: true
  when: build_mode in ["source", "git_clone"]

# --------------------------------------------------------------------------
# Create systemd unit for source builds
# --------------------------------------------------------------------------

- name: Create VerneMQ systemd unit (source mode)
  ansible.builtin.copy:
    dest: /etc/systemd/system/vernemq.service
    mode: "0644"
    content: |
      [Unit]
      Description=VerneMQ MQTT Broker
      After=network.target

      [Service]
      Type=forking
      User=vernemq
      Group=vernemq
      Environment=HOME={{ vernemq_install_dir }}
      Environment=WAIT_FOR_ERLANG=60
      Environment=ERL_FULLSWEEP_AFTER={{ erlang_fullsweep_after }}
      Environment="ERL_ZFLAGS=+sbt {{ erlang_scheduler_bind_type }} +sbwt {{ erlang_scheduler_busy_wait }} +swt {{ erlang_scheduler_wake_threshold }} +sbwtdcpu none +sbwtdio none"
      ExecStart={{ vernemq_install_dir }}/bin/vernemq start
      ExecStop={{ vernemq_install_dir }}/bin/vernemq stop
      LimitNOFILE=1048576
      LimitNPROC=65535
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  become: true
  when: build_mode in ["source", "git_clone"]
  notify: restart vernemq

- name: Ensure systemd drop-in directory exists (RPM)
  ansible.builtin.file:
    path: /etc/systemd/system/vernemq.service.d
    state: directory
    mode: "0755"
  become: true
  when: build_mode == "release"

- name: Create systemd drop-in for RPM scheduler tuning
  ansible.builtin.copy:
    dest: /etc/systemd/system/vernemq.service.d/scheduler-tuning.conf
    mode: "0644"
    content: |
      [Service]
      Environment="ERL_ZFLAGS=+sbt {{ erlang_scheduler_bind_type }} +sbwt {{ erlang_scheduler_busy_wait }} +swt {{ erlang_scheduler_wake_threshold }} +sbwtdcpu none +sbwtdio none"
      Environment=ERL_FULLSWEEP_AFTER={{ erlang_fullsweep_after }}
  become: true
  when: build_mode == "release"

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

# --------------------------------------------------------------------------
# Configuration (both modes)
# --------------------------------------------------------------------------

- name: Create VerneMQ data directory
  ansible.builtin.file:
    path: "{{ vernemq_data_dir }}"
    state: directory
    owner: vernemq
    group: vernemq
    mode: "0755"
  become: true

- name: Create VerneMQ log directory
  ansible.builtin.file:
    path: "{{ vernemq_log_dir }}"
    state: directory
    owner: vernemq
    group: vernemq
    mode: "0755"
  become: true

- name: Determine config directory
  ansible.builtin.set_fact:
    vernemq_actual_conf_dir: >-
      {{ vernemq_install_dir + '/etc' if build_mode in ['source', 'git_clone'] else vernemq_conf_dir }}

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ vernemq_actual_conf_dir | trim }}"
    state: directory
    owner: vernemq
    group: vernemq
    mode: "0755"
  become: true

- name: Deploy VerneMQ configuration
  ansible.builtin.template:
    src: vernemq.conf.j2
    dest: "{{ vernemq_actual_conf_dir | trim }}/vernemq.conf"
    owner: vernemq
    group: vernemq
    mode: "0644"
  become: true
  notify: restart vernemq

# NOTE: Scheduler tuning (+sbt, +sbwt, +swt) is applied via ERL_ZFLAGS in
# the systemd unit. Do NOT overwrite etc/vm.args — cuttlefish generates it
# from vernemq.conf and the release's vm.args template. Overwriting it would
# break cuttlefish config generation.

# --------------------------------------------------------------------------
# MQTT Authentication (passwd + ACL files)
# --------------------------------------------------------------------------

- name: Generate bcrypt password hash
  ansible.builtin.set_fact:
    bench_mqtt_password_hash: "{{ bench_mqtt_password | password_hash('bcrypt', rounds=12) }}"
  when: bench_auth_enabled and bench_mqtt_password | length > 0
  no_log: true

- name: Deploy vmq.passwd file
  ansible.builtin.copy:
    dest: "{{ vernemq_actual_conf_dir | trim }}/vmq.passwd"
    content: "{{ bench_mqtt_username }}:{{ bench_mqtt_password_hash }}\n"
    owner: vernemq
    group: vernemq
    mode: "0640"
  become: true
  when: bench_auth_enabled and bench_mqtt_password | length > 0
  notify: restart vernemq

- name: Deploy vmq.acl file (authenticated)
  ansible.builtin.copy:
    dest: "{{ vernemq_actual_conf_dir | trim }}/vmq.acl"
    content: |
      user {{ bench_mqtt_username }}
      topic #
    owner: vernemq
    group: vernemq
    mode: "0644"
  become: true
  when: bench_auth_enabled and bench_mqtt_password | length > 0
  notify: restart vernemq

- name: Deploy vmq.acl file (anonymous — allow all)
  ansible.builtin.copy:
    dest: "{{ vernemq_actual_conf_dir | trim }}/vmq.acl"
    content: |
      topic #
    owner: vernemq
    group: vernemq
    mode: "0644"
  become: true
  when: not (bench_auth_enabled and bench_mqtt_password | length > 0)
  notify: restart vernemq

# --------------------------------------------------------------------------
# Node exporter (for Prometheus metrics)
# --------------------------------------------------------------------------

- name: Install node_exporter
  ansible.builtin.include_role:
    name: node_exporter
