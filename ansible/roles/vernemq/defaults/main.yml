---
# Build mode: "release" downloads from GitHub, "source" builds from git
build_mode: release

# Release mode settings
vernemq_version: "2.1.1"
vernemq_release_url: "https://github.com/vernemq/vernemq/releases/download/{{ vernemq_version }}/vernemq-{{ vernemq_version }}.al2023.x86_64.rpm"

# Source mode settings
vernemq_repo: "https://github.com/vernemq/vernemq.git"
vernemq_branch: "main"
vernemq_src_dir: "/opt/vernemq-src"
vernemq_local_src_dir: "{{ playbook_dir }}/../../.."

# Git clone mode settings
vernemq_git_repo: ""
vernemq_git_ref: ""

# Installation paths
vernemq_install_dir: "/opt/vernemq"
vernemq_data_dir: "/var/lib/vernemq"
vernemq_log_dir: "/var/log/vernemq"
vernemq_conf_dir: "/etc/vernemq"

# Erlang VM settings
erlang_async_threads: 64
erlang_max_ports: 1048576
erlang_max_processes: 1048576
erlang_distribution_buffer_size: 32768
erlang_scheduler_bind_type: "db"
erlang_scheduler_busy_wait: "very_long"
erlang_scheduler_wake_threshold: "very_low"
erlang_fullsweep_after: 0

# MQTT listener (named "default" — the benchmark listener)
mqtt_listener_port: 1883
mqtt_listener_max_connections: 500000
mqtt_listener_nr_of_acceptors: 200

# Global listener defaults (applied to unnamed listeners)
listener_max_connections: 50000
listener_nr_of_acceptors: 200

# TCP listen options (Erlang proplist)
tcp_listen_options: "[{nodelay, true}, {linger, {true, 8}}, {send_timeout, 5000}, {send_timeout_close, true}, {backlog, 3072}, {exit_on_close, true}, {keepalive, true}]"

# Protocol versions and proxy protocol
listener_tcp_allowed_protocol_versions: "3,4,5"
listener_tcp_proxy_protocol: "off"
listener_ws_allowed_protocol_versions: "3,4,5"
listener_ws_proxy_protocol: "off"

# Clustering
distributed_cookie: "vmqbenchsecret"
clustering_listener_port: 44053

# MQTT protocol
mqtt_connect_timeout: 30000
disconnect_on_unauthorized_publish_v3: "on"
persistent_client_expiration: "72h"
upgrade_outgoing_qos: "on"

# Storage
leveldb_maximum_memory_percent: 20

# Balance / load distribution (integration only)
balance_enabled: "off"
balance_reject_enabled: "off"
balance_threshold: "1.2"
balance_hysteresis: "0.1"
balance_min_connections: 100
balance_check_interval: 5000

# Rebalancing (integration only)
rebalance_enabled: "off"
rebalance_threshold: "1.3"
rebalance_batch_size: 50
rebalance_cooldown: 30
rebalance_on_node_join: "off"
rebalance_stable_interval: 60
rebalance_auto_interval: 0

# Cluster health (integration only)
cluster_ready_quorum: "1.0"
cluster_ready_rpc_timeout: 5000
dead_node_cleanup_timeout: "0"

# Connection pool (integration only)
outgoing_clustering_connection_count: 4

# Clustering reconnect (integration only)
outgoing_clustering_reconnect_base_delay: 1000
outgoing_clustering_reconnect_max_delay: 5000
outgoing_clustering_buffer_drop_policy: "lifo"

# Registry (integration only)
reg_trie_workers: 8
reg_sync_shards: 8

# Gossip settings (integration only)
gossip_interval: 15000
fast_gossip_interval: 2000
fast_gossip_duration: 30000

# Version family: "auto" auto-detects, or specify "1.x", "2.x", "integration"
vernemq_version_family: "auto"
vmq_admin_cmd: "/usr/sbin/vmq-admin"  # RPM default; source builds override

# All tunable defaults (matching profile keys)
# These can be overridden via profile extra-vars
outgoing_clustering_buffer_size: 10000
max_inflight_messages: 50
max_online_messages: 10000
max_offline_messages: 10000
queue_deliver_mode: fanout
queue_type: fifo
max_message_rate: 0
max_message_size: 0
allow_register_during_netsplit: "on"
allow_publish_during_netsplit: "on"
allow_subscribe_during_netsplit: "on"
allow_unsubscribe_during_netsplit: "on"
coordinate_registrations: "on"
shared_subscription_policy: prefer_local

# Node exporter for Prometheus scraping
install_node_exporter: true
node_exporter_version: "1.7.0"

# Authentication
# Auth is enabled when a password is provided (by Terraform or manually).
# Set bench_auth_enabled: true and bench_mqtt_password to a non-empty value to activate.
bench_auth_enabled: false
bench_mqtt_username: "benchuser"
bench_mqtt_password: ""
