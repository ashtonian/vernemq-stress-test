---
# NOTE: Re-running deploy on a live cluster triggers simultaneous restarts
# unless the playbook uses serial: 1 to roll through nodes one at a time.
- name: kill stale vernemq
  ansible.builtin.shell:
    cmd: |
      systemctl stop vernemq 2>/dev/null || true
      pkill -9 beam.smp 2>/dev/null || true
      sleep 2
  become: true
  changed_when: false
  listen: restart vernemq

- name: start vernemq
  ansible.builtin.service:
    name: vernemq
    state: started
  become: true
  listen: restart vernemq

- name: reload vernemq
  ansible.builtin.command:
    cmd: "{{ vmq_admin_cmd | default('/usr/sbin/vmq-admin') }} reload"
  become: true
  changed_when: true
