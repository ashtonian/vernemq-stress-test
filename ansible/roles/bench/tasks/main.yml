---
# --------------------------------------------------------------------------
# emqtt-bench (prebuilt release for Amazon Linux 2023 x86_64)
# --------------------------------------------------------------------------

- name: Download emqtt-bench prebuilt release
  ansible.builtin.get_url:
    url: "https://github.com/emqx/emqtt-bench/releases/download/0.6.2/emqtt-bench-0.6.2-amzn2023-amd64.tar.gz"
    dest: /tmp/emqtt-bench.tar.gz
    mode: "0644"

- name: Create emqtt-bench directory
  ansible.builtin.file:
    path: /opt/emqtt-bench
    state: directory
    mode: "0755"
  become: true

- name: Extract emqtt-bench
  ansible.builtin.unarchive:
    src: /tmp/emqtt-bench.tar.gz
    dest: /opt/emqtt-bench
    remote_src: true
  become: true

- name: Symlink emqtt_bench to /usr/local/bin
  ansible.builtin.file:
    src: /opt/emqtt-bench/bin/emqtt_bench
    dest: /usr/local/bin/emqtt_bench
    state: link
  become: true

- name: Verify emqtt_bench works
  ansible.builtin.command:
    cmd: /usr/local/bin/emqtt_bench --help
  changed_when: false
  ignore_errors: true

# --------------------------------------------------------------------------
# mosquitto-clients (for ad-hoc MQTT testing)
# --------------------------------------------------------------------------

- name: Install mosquitto clients
  ansible.builtin.dnf:
    name:
      - mosquitto
    state: present
    disable_gpg_check: true
  become: true
  ignore_errors: true

# --------------------------------------------------------------------------
# Node exporter (for monitoring bench nodes)
# --------------------------------------------------------------------------

- name: Download node_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1", "--wildcards", "*/node_exporter"]
  become: true

- name: Create node_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true
