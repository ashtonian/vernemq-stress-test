---
# --------------------------------------------------------------------------
# emqtt-bench (prebuilt release for Amazon Linux 2023 x86_64)
# --------------------------------------------------------------------------

- name: Download emqtt-bench prebuilt release
  ansible.builtin.get_url:
    url: "https://github.com/emqx/emqtt-bench/releases/download/{{ emqtt_bench_version }}/emqtt-bench-{{ emqtt_bench_version }}-{{ emqtt_bench_platform }}.tar.gz"
    dest: /tmp/emqtt-bench.tar.gz
    mode: "0644"

- name: Create emqtt-bench directory
  ansible.builtin.file:
    path: "{{ emqtt_bench_install_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Extract emqtt-bench
  ansible.builtin.unarchive:
    src: /tmp/emqtt-bench.tar.gz
    dest: "{{ emqtt_bench_install_dir }}"
    remote_src: true
  become: true

- name: Symlink emqtt_bench to /usr/local/bin
  ansible.builtin.file:
    src: "{{ emqtt_bench_install_dir }}/bin/emqtt_bench"
    dest: /usr/local/bin/emqtt_bench
    state: link
  become: true

- name: Verify emqtt_bench works
  ansible.builtin.command:
    cmd: /usr/local/bin/emqtt_bench --help
  changed_when: false
  ignore_errors: true

# --------------------------------------------------------------------------
# mosquitto-clients (for ad-hoc MQTT testing)
# --------------------------------------------------------------------------

- name: Install mosquitto clients
  ansible.builtin.dnf:
    name:
      - mosquitto
    state: present
    disable_gpg_check: true
  become: true
  ignore_errors: true

# --------------------------------------------------------------------------
# Node exporter (for monitoring bench nodes)
# --------------------------------------------------------------------------

- name: Install node_exporter
  ansible.builtin.include_role:
    name: node_exporter
