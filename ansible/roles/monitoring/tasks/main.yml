---
# --------------------------------------------------------------------------
# Prometheus
# --------------------------------------------------------------------------

- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /sbin/nologin
    create_home: false
  become: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - "{{ prometheus_install_dir }}"
    - "{{ prometheus_data_dir }}"
  become: true

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: "0644"

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: "{{ prometheus_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    owner: prometheus
    group: prometheus
  become: true

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_install_dir }}/prometheus.yml"
    owner: prometheus
    group: prometheus
    mode: "0644"
  become: true
  notify: restart prometheus

- name: Create Prometheus systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Monitoring
      After=network.target

      [Service]
      Type=simple
      User=prometheus
      Group=prometheus
      ExecStart={{ prometheus_install_dir }}/prometheus \
        --config.file={{ prometheus_install_dir }}/prometheus.yml \
        --storage.tsdb.path={{ prometheus_data_dir }} \
        --storage.tsdb.retention.time=30d \
        --web.listen-address=:9090
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and start Prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true
  become: true

# --------------------------------------------------------------------------
# Grafana
# --------------------------------------------------------------------------

- name: Add Grafana RPM repository
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/grafana.repo
    mode: "0644"
    content: |
      [grafana]
      name=Grafana OSS
      baseurl=https://rpm.grafana.com
      repo_gpgcheck=1
      enabled=1
      gpgcheck=1
      gpgkey=https://rpm.grafana.com/gpg.key
      sslverify=1
      sslcacert=/etc/pki/tls/certs/ca-bundle.crt
  become: true

- name: Install Grafana
  ansible.builtin.dnf:
    name: "grafana-{{ grafana_version }}"
    state: present
  become: true

- name: Configure Grafana admin password
  ansible.builtin.lineinfile:
    path: /etc/grafana/grafana.ini
    regexp: "^;?admin_password ="
    line: "admin_password = {{ grafana_admin_password }}"
    insertafter: "\\[security\\]"
  become: true

- name: Create Grafana provisioning directory for datasources
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  become: true

- name: Provision Prometheus datasource in Grafana
  ansible.builtin.copy:
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: grafana
    mode: "0644"
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://localhost:9090
          isDefault: true
          editable: false
  become: true

- name: Create Grafana provisioning directory for dashboards
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  become: true

- name: Provision dashboard provider
  ansible.builtin.copy:
    dest: /etc/grafana/provisioning/dashboards/default.yml
    owner: grafana
    group: grafana
    mode: "0644"
    content: |
      apiVersion: 1
      providers:
        - name: Default
          orgId: 1
          folder: VerneMQ
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          options:
            path: /var/lib/grafana/dashboards
            foldersFromFilesStructure: false
  become: true

- name: Create dashboards directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  become: true

- name: Deploy VerneMQ Grafana dashboard
  ansible.builtin.copy:
    src: vernemq-dashboard.json
    dest: /var/lib/grafana/dashboards/vernemq-dashboard.json
    owner: grafana
    group: grafana
    mode: "0644"
  become: true

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: true
    daemon_reload: true
  become: true

# --------------------------------------------------------------------------
# Node exporter on the monitor node itself
# --------------------------------------------------------------------------

- name: Download node_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1", "--wildcards", "*/node_exporter"]
  become: true

- name: Create node_exporter systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
  become: true
