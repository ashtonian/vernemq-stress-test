[defaults]
inventory = inventory/hosts
roles_path = roles
host_key_checking = False
timeout = 30
forks = 20
pipelining = True
gathering = smart
remote_user = ec2-user

[ssh_connection]
# private_key_file is set via ANSIBLE_PRIVATE_KEY_FILE env var (sourced from bench.env)
# so there is no hardcoded path here.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
