[defaults]
inventory = inventory/hosts
roles_path = roles
host_key_checking = False
timeout = 30
forks = 20
pipelining = True
gathering = smart
private_key_file = ~/.ssh/vernemq-bench-home-ops.pem
remote_user = ec2-user

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
