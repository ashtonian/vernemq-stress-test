---
# Stop VerneMQ and clean data directories (use between benchmark runs).
#
# Usage:
#   ansible-playbook -i inventory/hosts teardown_cluster.yml
#
- name: Teardown VerneMQ cluster
  hosts: vmq_nodes
  become: true
  vars_files:
    - roles/vernemq/defaults/main.yml
  tasks:
    - name: Stop VerneMQ service
      ansible.builtin.service:
        name: vernemq
        state: stopped
      ignore_errors: true

    - name: Kill stale VerneMQ/BEAM processes
      ansible.builtin.shell:
        cmd: pkill -9 beam.smp || true
      changed_when: false

    - name: Wait for processes to exit
      ansible.builtin.pause:
        seconds: 2

    - name: Clean VerneMQ data directory
      ansible.builtin.file:
        path: "{{ vernemq_data_dir }}"
        state: absent

    - name: Recreate VerneMQ data directory
      ansible.builtin.file:
        path: "{{ vernemq_data_dir }}"
        state: directory
        owner: vernemq
        group: vernemq
        mode: "0755"
      ignore_errors: true

    - name: Clean VerneMQ log directory
      ansible.builtin.file:
        path: "{{ vernemq_log_dir }}"
        state: absent

    - name: Recreate VerneMQ log directory
      ansible.builtin.file:
        path: "{{ vernemq_log_dir }}"
        state: directory
        owner: vernemq
        group: vernemq
        mode: "0755"
      ignore_errors: true

    - name: Display teardown complete
      ansible.builtin.debug:
        msg: "VerneMQ stopped and data cleaned on {{ inventory_hostname }}"
